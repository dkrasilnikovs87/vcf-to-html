name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk libgtk-3-dev

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (macOS / Linux)
        if: runner.os != 'Windows'
        run: pyinstaller --windowed --name "VCF Converter" --collect-all customtkinter --noconfirm main.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --windowed --name "VCF Converter" --collect-all customtkinter --noconfirm main.py

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../VCF-Converter-macOS.zip "VCF Converter.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist\VCF Converter" -DestinationPath VCF-Converter-Windows.zip
        shell: pwsh

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar -czf ../VCF-Converter-Linux.tar.gz "VCF Converter"

      # ── Upload to GitHub Release ──────────────────────────────────────────────

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VCF-Converter-macOS.zip
            VCF-Converter-Windows.zip
            VCF-Converter-Linux.tar.gz
